# ======================================================================================
# Workflow: CI
# ======================================================================================
# vet / test (race) / build (Linux + macOS) を並列実行する基本 CI。
# Go バージョンは go.mod から読み込むので、go.mod を更新すれば自動追従する。
# pull_request と main への push で発火し、同じ ref で複数 run が走った場合は
# concurrency で旧 run をキャンセルする。
# ======================================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    # 初回導入時は既存コードの指摘が大量に残っているため、CI 全体を即落とさない。
    # 指摘を別 PR で順次解消後、この continue-on-error は外す。issue #8 参照。
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6

  test:
    name: Test (race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race ./...

  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
