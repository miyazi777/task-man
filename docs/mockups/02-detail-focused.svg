<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 380" width="940" height="380" font-family="'JetBrains Mono','Menlo','Consolas','DejaVu Sans Mono','Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',monospace">
  <!-- Canvas -->
  <rect width="940" height="380" rx="8" fill="#1e1e2e"/>

  <!-- Vertical divider -->
  <line x1="320" y1="20" x2="320" y2="320" stroke="#313244" stroke-width="1"/>

  <!-- Selected row indicator on left (no full highlight, thin bar only) -->
  <rect x="28" y="30" width="3" height="24" rx="1.5" fill="#45475a"/>

  <!-- Left side rows (dimmed) -->
  <text x="64" y="48" font-size="14" fill="#7f849c">設計書を書く</text>
  <text x="310" y="48" font-size="13" fill="#585b70" font-weight="bold" text-anchor="end">[todo]</text>

  <text x="64" y="72" font-size="14" fill="#7f849c">実装を進める</text>
  <text x="310" y="72" font-size="13" fill="#7c6f57" font-weight="bold" text-anchor="end">[doing]</text>

  <text x="64" y="96" font-size="14" fill="#7f849c">仕様レビュー</text>
  <text x="310" y="96" font-size="13" fill="#5d7560" font-weight="bold" text-anchor="end">[done]</text>

  <text x="64" y="120" font-size="14" fill="#7f849c">テスト計画作成</text>
  <text x="310" y="120" font-size="13" fill="#585b70" font-weight="bold" text-anchor="end">[todo]</text>

  <!-- Right side: title row -->
  <text x="340" y="48" font-size="13" fill="#6c7086">Title</text>
  <text x="420" y="48" font-size="14" fill="#cdd6f4">設計書を書く</text>

  <!-- Status row (focused) -->
  <rect x="328" y="54" width="584" height="24" rx="4" fill="#313244"/>
  <rect x="328" y="54" width="3" height="24" rx="1.5" fill="#89b4fa"/>
  <text x="340" y="72" font-size="13" fill="#89b4fa">Status</text>
  <text x="420" y="72" font-size="14" fill="#fab387" font-weight="bold">doing</text>
  <text x="900" y="72" font-size="11" fill="#89b4fa" text-anchor="end">▼</text>

  <!-- Status options popup -->
  <rect x="420" y="84" width="160" height="84" rx="6" fill="#11111b" stroke="#45475a" stroke-width="1"/>

  <text x="436" y="108" font-size="13" fill="#6c7086" font-weight="bold">  todo</text>

  <rect x="424" y="116" width="152" height="24" rx="3" fill="#313244"/>
  <rect x="424" y="116" width="2" height="24" fill="#fab387"/>
  <text x="436" y="132" font-size="13" fill="#fab387" font-weight="bold">▶ doing</text>

  <text x="436" y="156" font-size="13" fill="#a6e3a1" font-weight="bold">  done</text>

  <text x="340" y="200" font-size="11" fill="#6c7086" font-style="italic">k: 前のステータスへ  /  j: 次のステータスへ</text>

  <!-- Footer surface -->
  <rect x="0" y="336" width="940" height="32" fill="#313244"/>

  <!-- Hints -->
  <g font-size="12" fill="#a6adc8">
    <text x="24" y="357"><tspan font-weight="bold" fill="#cdd6f4">k</tspan>:status prev  <tspan font-weight="bold" fill="#cdd6f4">j</tspan>:status next  <tspan font-weight="bold" fill="#cdd6f4">esc</tspan>:back to list  <tspan font-weight="bold" fill="#cdd6f4">q</tspan>:quit</text>
  </g>
</svg>
