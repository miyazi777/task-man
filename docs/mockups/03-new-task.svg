<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 380" width="940" height="380" font-family="'JetBrains Mono','Menlo','Consolas','DejaVu Sans Mono','Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',monospace">
  <!-- Canvas -->
  <rect width="940" height="380" rx="8" fill="#1e1e2e"/>

  <!-- Vertical divider -->
  <line x1="320" y1="20" x2="320" y2="320" stroke="#313244" stroke-width="1"/>

  <!-- Left side rows (dimmed) -->
  <text x="64" y="48" font-size="14" fill="#7f849c">設計書を書く</text>
  <text x="310" y="48" font-size="13" fill="#585b70" font-weight="bold" text-anchor="end">[todo]</text>

  <text x="64" y="72" font-size="14" fill="#7f849c">実装を進める</text>
  <text x="310" y="72" font-size="13" fill="#7c6f57" font-weight="bold" text-anchor="end">[doing]</text>

  <text x="64" y="96" font-size="14" fill="#7f849c">仕様レビュー</text>
  <text x="310" y="96" font-size="13" fill="#5d7560" font-weight="bold" text-anchor="end">[done]</text>

  <text x="64" y="120" font-size="14" fill="#7f849c">テスト計画作成</text>
  <text x="310" y="120" font-size="13" fill="#585b70" font-weight="bold" text-anchor="end">[todo]</text>

  <!-- Pending placeholder row -->
  <line x1="40" y1="132" x2="314" y2="132" stroke="#313244" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="64" y="150" font-size="14" fill="#f9e2af" font-style="italic" opacity="0.85">(入力中…)</text>
  <text x="310" y="150" font-size="13" fill="#f9e2af" font-weight="bold" text-anchor="end">[todo]</text>

  <!-- Right side: input form -->
  <text x="340" y="44" font-size="13" fill="#6c7086">Title</text>
  <rect x="340" y="52" width="580" height="36" rx="6" fill="#11111b" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="356" y="76" font-size="14" fill="#cdd6f4">ユーザー認証を実装</text>
  <!-- Caret -->
  <rect x="490" y="60" width="2" height="20" fill="#f9e2af">
    <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
  </rect>

  <text x="340" y="116" font-size="13" fill="#6c7086">Status</text>
  <text x="420" y="116" font-size="14" fill="#6c7086" font-weight="bold">todo</text>
  <text x="472" y="116" font-size="11" fill="#585b70" font-style="italic">(default)</text>

  <!-- Footer surface -->
  <rect x="0" y="336" width="940" height="32" fill="#313244"/>

  <!-- Hints -->
  <g font-size="12" fill="#a6adc8">
    <text x="24" y="357"><tspan font-weight="bold" fill="#cdd6f4">Enter</tspan>:save  <tspan font-weight="bold" fill="#cdd6f4">Esc</tspan>:discard</text>
  </g>
</svg>
