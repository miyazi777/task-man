<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 380" width="940" height="380" font-family="'JetBrains Mono','Menlo','Consolas','DejaVu Sans Mono','Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',monospace">
  <!-- Canvas -->
  <rect width="940" height="380" rx="8" fill="#1e1e2e"/>

  <!-- Vertical divider -->
  <line x1="320" y1="20" x2="320" y2="320" stroke="#313244" stroke-width="1"/>

  <!-- Cursor row (left side) -->
  <rect x="28" y="30" width="286" height="24" rx="4" fill="#313244"/>
  <rect x="28" y="30" width="3" height="24" rx="1.5" fill="#89b4fa"/>

  <!-- Row 1 (cursor) -->
  <text x="44" y="48" font-size="14" fill="#89b4fa" font-weight="bold">▶</text>
  <text x="64" y="48" font-size="14" fill="#cdd6f4" font-weight="bold">設計書を書く</text>
  <text x="310" y="48" font-size="13" fill="#6c7086" font-weight="bold" text-anchor="end">[todo]</text>

  <!-- Row 2 -->
  <text x="64" y="72" font-size="14" fill="#cdd6f4">実装を進める</text>
  <text x="310" y="72" font-size="13" fill="#fab387" font-weight="bold" text-anchor="end">[doing]</text>

  <!-- Row 3 -->
  <text x="64" y="96" font-size="14" fill="#a6adc8">仕様レビュー</text>
  <text x="310" y="96" font-size="13" fill="#a6e3a1" font-weight="bold" text-anchor="end">[done]</text>

  <!-- Row 4 -->
  <text x="64" y="120" font-size="14" fill="#cdd6f4">テスト計画作成</text>
  <text x="310" y="120" font-size="13" fill="#6c7086" font-weight="bold" text-anchor="end">[todo]</text>

  <!-- Right side: detail of selected task -->
  <text x="340" y="48" font-size="13" fill="#6c7086">Title</text>
  <text x="420" y="48" font-size="14" fill="#cdd6f4">設計書を書く</text>

  <text x="340" y="72" font-size="13" fill="#6c7086">Status</text>
  <text x="420" y="72" font-size="14" fill="#6c7086" font-weight="bold">todo</text>

  <!-- Footer surface -->
  <rect x="0" y="336" width="940" height="32" fill="#313244"/>

  <!-- Hints -->
  <g font-size="12" fill="#a6adc8">
    <text x="24" y="357"><tspan font-weight="bold" fill="#cdd6f4">k</tspan>:up  <tspan font-weight="bold" fill="#cdd6f4">j</tspan>:down  <tspan font-weight="bold" fill="#cdd6f4">enter</tspan>:detail  <tspan font-weight="bold" fill="#cdd6f4">a</tspan>:new  <tspan font-weight="bold" fill="#cdd6f4">q</tspan>:quit</text>
  </g>
</svg>
